<header class="topbar">
    <div class="topbar-left">
        <button class="hamburger-btn" (click)="onToggleSidebar()">
            <i class="fa-solid fa-bars"></i>
        </button>
        
        <!-- Mobile Logo -->
        <div class="mobile-logo">
            <div class="logo-icon">
                <i class="fa-solid fa-church"></i>
            </div>
            <span class="brand-text">I.C.C</span>
        </div>
    </div>

    <div class="topbar-right">
        <!-- Theme Toggle -->
        <button class="theme-toggle-btn" (click)="themeService.toggleTheme()" [title]="themeService.isDarkMode() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
            <i class="fa-solid" [ngClass]="themeService.isDarkMode() ? 'fa-sun' : 'fa-moon'"></i>
        </button>

        <div class="user-info" *ngIf="authService.currentUser() as user">
            <div class="user-text">
                <span class="complete-name">{{ user.completeName }}</span>
                <span class="user-name">{{ user.username }}</span>
            </div>
            <div class="user-avatar">
                <img [src]="user.pictureProfileUrl || 'https://ui-avatars.com/api/?name=' + user.completeName + '&background=3b82f6&color=fff'"
                    alt="Avatar">
            </div>
        </div>
    </div>
</header>
