<aside class="sidebar" [ngClass]="{'sidebar-open': isOpen}">
    <button class="mobile-close-btn" (click)="close()">
        <i class="fa-solid fa-times"></i>
    </button>
    
    <div class="sidebar-header">
        <div class="logo">
            <i class="fa-solid fa-church"></i>
        </div>
        <div class="brand">
            <span class="brand-line1">I.C.C</span>
            <span class="brand-line2">TABERNÁCULO DE ADORACIÓN</span>
        </div>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section">
            <h3 class="section-title">PRINCIPAL</h3>
            <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" *ngIf="can('MANAGE_DASHBOARD')" (click)="close()">
                <i class="fa-solid fa-gauge"></i>
                <span>Dashboard</span>
            </a>
            <a routerLink="/reportes" routerLinkActive="active" class="nav-item" *ngIf="can('MANAGE_REPORT')" (click)="close()">
                <i class="fa-solid fa-chart-line"></i>
                <span>Reportes</span>
            </a>
        </div>

        <div class="nav-section">
            <h3 class="section-title">GESTIÓN DE INTEGRANTES</h3>
            <a routerLink="/integrantes" routerLinkActive="active" class="nav-item" *ngIf="can('VIEW_MEMBER_PANEL')" (click)="close()">
                <i class="fa-solid fa-users"></i>
                <span>Integrantes</span>
            </a>
            <a routerLink="/bautismos" routerLinkActive="active" class="nav-item" *ngIf="can('VIEW_BAPTISM_PANEL')" (click)="close()">
                <i class="fa-solid fa-water"></i>
                <span>Bautismos</span>
            </a>
            <a routerLink="/asistencia" routerLinkActive="active" class="nav-item" *ngIf="can('REGISTER_ATTENDANCE')" (click)="close()">
                <i class="fa-solid fa-calendar-check"></i>
                <span>Pasar Asistencia</span>
            </a>
        </div>

        <div class="nav-section">
            <h3 class="section-title">ADMINISTRACIÓN</h3>
            <a routerLink="/usuarios" routerLinkActive="active" class="nav-item" *ngIf="can('VIEW_USER_PANEL')" (click)="close()">
                <i class="fa-solid fa-user-gear"></i>
                <span>Usuarios del Sistema</span>
            </a>
            <a routerLink="/roles" routerLinkActive="active" class="nav-item" *ngIf="can('VIEW_ROLE_PANEL')" (click)="close()">
                <i class="fa-solid fa-user-shield"></i>
                <span>Roles y Permisos</span>
            </a>
            <a routerLink="/servicios" routerLinkActive="active" class="nav-item" *ngIf="can('VIEW_SERVICE_PANEL')" (click)="close()">
                <i class="fa-solid fa-church"></i>
                <span>Gestión de Servicios</span>
            </a>
            <a routerLink="/eventos" routerLinkActive="active" class="nav-item" *ngIf="can('VIEW_EVENTS_PANEL')" (click)="close()">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Eventos</span>
            </a>
            <a routerLink="/asistencias/administrar" routerLinkActive="active" class="nav-item"
                *ngIf="can('MANAGE_ATTENDANCE')" (click)="close()">
                <i class="fa-solid fa-clipboard-list"></i>
                <span>Administrar Asistencias</span>
            </a>
            <a routerLink="/sedes" routerLinkActive="active" class="nav-item" *ngIf="can('VIEW_BRANCH_PANEL')" (click)="close()">
                <i class="fa-solid fa-map-location-dot"></i>
                <span>Sedes</span>
            </a>
            <a routerLink="/configuracion" routerLinkActive="active" class="nav-item" *ngIf="can('ADMINISTRATOR')" (click)="close()">
                <i class="fa-solid fa-gear"></i>
                <span>Configuración</span>
            </a>
        </div>
    </nav>

    <div class="sidebar-footer">
        <button class="nav-item btn-install-app" *ngIf="pwaService.showInstallButton" (click)="installApp()">
            <i class="fa-solid fa-download"></i>
            <span>Instalar App</span>
        </button>
        <button class="nav-item logout-btn" (click)="logout()">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Cerrar Sesión</span>
        </button>
    </div>
</aside>
