<app-service-calendar 
    [isAdmin]="isAdmin" 
    [isSelectionMode]="false"
    [canCreate]="canCreate"
    (eventAction)="cancelEvent($event)"
    (createEvent)="openModal()">
</app-service-calendar>

<!-- Modal Form (Only needed here, child handles calendar) -->
<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()"></div>
<div class="modal-content" *ngIf="showModal">
    <div class="modal-header">
        <h2 class="modal-title">Nuevo Evento</h2>
        <button class="btn-icon" (click)="closeModal()">
            <i class="fa-solid fa-times"></i>
        </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="save()" class="modal-form">
        <!-- Service Selection -->
        <div class="form-group">
            <label class="form-label">Servicio</label>
            <select formControlName="serviceId" class="form-control">
                <option value="">Seleccione un servicio</option>
                <option *ngFor="let s of services" [value]="s.id">{{ s.name }}</option>
            </select>
        </div>

        <!-- Branch Selection -->
        <div class="form-group" *ngIf="isAdmin || currentUserBranchId">
            <label class="form-label">Sede</label>
            <select formControlName="branchId" class="form-control" [attr.disabled]="!isAdmin ? '' : null">
                <option value="">Seleccione una sede</option>
                <option *ngFor="let b of branches" [value]="b.id">{{ b.name }}</option>
            </select>
        </div>

        <!-- Date -->
        <div class="form-group">
            <label class="form-label">Fecha</label>
            <input type="date" formControlName="date" class="form-control" [min]="minDate">
        </div>

        <!-- Time Range -->
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Hora Inicio</label>
                <input type="time" formControlName="startTime" class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">Hora Fin</label>
                <input type="time" formControlName="endTime" class="form-control">
            </div>
        </div>

        <div class="modal-actions">
            <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancelar</button>
            <button type="submit" class="btn btn-primary" [disabled]="isSaving">
                <span *ngIf="!isSaving">Guardar</span>
                <span *ngIf="isSaving"><i class="fa-solid fa-spinner fa-spin"></i> Guardando...</span>
            </button>
        </div>
    </form>
</div>
