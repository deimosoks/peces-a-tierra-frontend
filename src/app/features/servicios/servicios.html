
<!-- Floating Action Button (Mobile Only) -->
<button class="fab-add-service" (click)="openFormModal()" *ngIf="can('CREATE_SERVICE') || can('UPDATE_SERVICE')">
    <i class="fa-solid fa-plus"></i>
</button>

<div class="servicios-container">
    <div class="card premium-card">
        <!-- New Header Section (Soft UI) -->
        <div class="header-section" *ngIf="can('CREATE_SERVICE') || can('UPDATE_SERVICE')">
            <div class="search-center" style="display: flex; gap: 1rem; flex: 1; align-items: flex-end;">
                <!-- Service Name -->
                <div class="soft-input-group" style="flex: 1;">
                    <label class="soft-label">Nombre del Servicio</label>
                    <div class="soft-input-wrapper">
                        <i class="fa-solid fa-church soft-input-icon"></i>
                        <input type="text" [(ngModel)]="serviceForm.name" name="name"
                            placeholder="Ej: Culto de Adoración" required class="soft-input">
                    </div>
                </div>
                <!-- Description -->
                <div class="soft-input-group" style="flex: 2;">
                    <label class="soft-label">Descripción</label>
                    <div class="soft-input-wrapper">
                        <i class="fa-solid fa-align-left soft-input-icon"></i>
                        <input type="text" [(ngModel)]="serviceForm.description" name="description"
                            placeholder="Breve descripción" required class="soft-input">
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="actions-right desktop-only">
                <div class="soft-input-group">
                    <label class="soft-label invisible-label">Acciones</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <button type="button" (click)="onServiceSubmit()" class="btn btn-primary btn-action-soft" [disabled]="isSavingService">
                            <i class="fa-solid" [ngClass]="isSavingService ? 'fa-spinner fa-spin' : (isEditingService ? 'fa-save' : 'fa-plus')"></i>
                            <span>{{ isSavingService ? (isEditingService ? 'Actualizando...' : 'Agregando...') : (isEditingService ? 'Actualizar' : 'Agregar') }}</span>
                        </button>
                        <button type="button" *ngIf="isEditingService" class="btn btn-secondary btn-action-soft" (click)="resetServiceForm()">
                            Cancelar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Services List -->
        <div class="table-container">
            <table class="premium-table">
                <thead>
                    <tr>
                        <th style="text-align: left; padding-left: 2rem;">NOMBRE</th>
                        <th class="desktop-only text-muted" style="text-align: left;">DESCRIPCIÓN</th>
                        <th class="text-center desktop-only">ESTADO</th>
                        <th class="text-center">ACCIONES</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngIf="isLoading">
                        <td colspan="4" style="padding: 0; border: none;">
                            <div class="loading-container">
                                <div class="loading-spinner"></div>
                                <div>Cargando servicios...</div>
                            </div>
                        </td>
                    </tr>
                    <ng-container *ngIf="!isLoading">
                    <tr *ngFor="let s of services" [class.inactive-row]="!s.active">
                        <td style="text-align: left; padding-left: 2rem;">
                            <span class="username" style="font-size: 1rem;">{{ s.name }}</span>
                        </td>
                        <td class="text-muted desktop-only" style="text-align: left;">{{ s.description }}</td>
                        <td class="text-center desktop-only">
                            <label class="status-switch" appSafeClick (safeClick)="toggleServiceStatus(s)">
                                <input type="checkbox" [checked]="s.active" 
                                    [disabled]="!can('UPDATE_SERVICE')">
                                <span class="slider round"></span>
                            </label>
                        </td>
                        <td class="text-center">
                            <div class="actions-mini justify-center">
                                <!-- Desktop Actions -->
                                <div class="desktop-only desktop-actions">
                                    <button class="action-btn-sm edit" (click)="editService(s)" title="Editar"
                                        *ngIf="can('UPDATE_SERVICE')">
                                        <i class="fa-solid fa-pen-to-square"></i>
                                    </button>
                                    <button class="action-btn-sm delete" (click)="deleteService(s.id)" title="Eliminar"
                                        *ngIf="can('DELETE_SERVICE')">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>

                                <!-- Mobile Actions -->
                                <div class="mobile-only mobile-actions-wrapper">
                                    <button class="menu-trigger" (click)="toggleDropdown($event, s.id)">
                                        <i class="fa-solid fa-ellipsis-vertical"></i>
                                    </button>

                                    <div class="action-dropdown" *ngIf="activeDropdownId === s.id" (click)="$event.stopPropagation()">
                                        <div class="dropdown-header-mobile">
                                            <span class="member-name-small">{{ s.name }}</span>
                                        </div>
                                        <div class="dropdown-item status-row">
                                            <span class="dropdown-label">Estado</span>
                                            <label class="status-switch" appSafeClick (safeClick)="toggleServiceStatus(s)">
                                                <input type="checkbox" [checked]="s.active" [disabled]="!can('UPDATE_SERVICE')">
                                                <span class="slider round"></span>
                                            </label>
                                        </div>
                                        <hr class="dropdown-divider">
                                        <button class="dropdown-item" (click)="editService(s); closeDropdown()" *ngIf="can('UPDATE_SERVICE')">
                                            <i class="fa-solid fa-pen text-primary"></i>
                                            <span>Editar</span>
                                        </button>
                                        <button class="dropdown-item" (click)="deleteService(s.id); closeDropdown()" *ngIf="can('DELETE_SERVICE')">
                                            <i class="fa-solid fa-trash text-danger"></i>
                                            <span class="delete-text">Eliminar</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                    </ng-container>
                    <tr *ngIf="services.length === 0 && !isLoading">
                        <td colspan="4" style="text-align: center; padding: 2rem; color: var(--text-muted);">
                            <i class="fa-solid fa-church" style="font-size: 2rem; display: block; margin-bottom: 0.5rem; opacity: 0.4;"></i>
                            No hay servicios registrados
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Service Form Modal (Mobile Only) -->
<div class="modal-overlay" *ngIf="showFormModal" (click)="closeFormModal()">
    <div class="modal-content service-modal" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2>{{ isEditingService ? 'Editar Servicio' : 'Nuevo Servicio' }}</h2>
            <button class="close-btn" (click)="closeFormModal()" [disabled]="isSavingService">&times;</button>
        </div>

        <!-- Loading Overlay -->
        <div class="modal-loading-overlay" *ngIf="isSavingService">
            <div class="spinner-wrapper">
                <div class="spinner-circle"></div>
                <p>Procesando...</p>
            </div>
        </div>

        <div class="modal-body">
            <form (submit)="onServiceSubmit()" class="service-form-modal">
                <div class="form-group">
                    <label>Nombre del Servicio</label>
                    <input type="text" [(ngModel)]="serviceForm.name" name="name"
                        placeholder="Ej: Culto de Adoración" required class="premium-input">
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" [(ngModel)]="serviceForm.description" name="description"
                        placeholder="Breve descripción" required class="premium-input">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-muted" (click)="closeFormModal()" [disabled]="isSavingService">Cancelar</button>
                    <button type="submit" class="btn btn-primary" [disabled]="isSavingService">
                        <i class="fa-solid" [ngClass]="isSavingService ? 'fa-spinner fa-spin' : (isEditingService ? 'fa-save' : 'fa-plus')"></i>
                        {{ isSavingService ? (isEditingService ? 'Actualizando...' : 'Agregando...') : (isEditingService ? 'Actualizar' : 'Agregar') }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
